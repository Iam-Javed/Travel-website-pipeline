# Workflow for my end to end tarvel website project.

name: End to End Travel Website Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight

jobs:
  Build:
    environment: Prod1
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
      
      - name: Docker Image Build
        run: |
          docker build --file docker/Dockerfile --tag travel-website:latest .
      
      - name: Save Docker image
        run: docker save travel-website:latest -o travel-website.tar
      
      - name: Upload Docker Image as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: travel-website-image
          path: travel-website.tar

  Push:
    runs-on: ubuntu-latest
    environment: Prod1
    needs: Build
    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: travel-website-image

      - name: Load Docker Image
        run: docker load -i travel-website.tar

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag image and push to Docker Hub
        run: |
          docker tag travel-website:latest ${{ secrets.DOCKER_USERNAME }}/travel-website:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/travel-website:latest
    
  deploy:
    runs-on: ubuntu-latest
    environment: Prod1
    needs: Push
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connection
        run: kubectl get nodes

      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
